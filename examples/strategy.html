<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>量潮科技 战略管理</title>
<style>
  body { font-family: -apple-system, 'Segoe UI', Noto Sans SC, sans-serif; margin: 0; background: #f5f5f5; color: #222; }
  .header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem; text-align: center; }
  .header h1 { margin: 0; font-size: 1.6rem; font-weight: 600; }
  .header p { margin: .5rem 0 0; opacity: .75; font-size: .9rem; }
  .container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
  .card { background: #fff; border-radius: 8px; padding: 1.2rem 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .card h2 { margin: 0 0 .5rem; font-size: 1.1rem; color: #1a1a2e; }
  .card .meta { font-size: .85rem; color: #666; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
  .bu { background: #fff; border-radius: 8px; padding: 1rem 1.2rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); border-top: 3px solid #1a1a2e; }
  .bu h3 { margin: 0 0 .3rem; font-size: 1rem; }
  .bu .tag { display: inline-block; font-size: .75rem; padding: 1px 6px; border-radius: 4px; margin-bottom: .5rem; background: #e8e8e8; color: #555; }
  .bu .challenge { font-size: .85rem; color: #444; margin-bottom: .5rem; line-height: 1.5; }
  .bu .signal { font-size: .82rem; color: #1a7a2e; background: #e8f5e9; padding: .4rem .6rem; border-radius: 4px; }
  .bu .signal::before { content: "📡 "; }
  .tactics { margin: .5rem 0 0; padding-left: 1.2rem; font-size: .85rem; color: #555; }
  .tactics li { margin-bottom: .2rem; }
  .tension { background: #fff8e1; border-left: 3px solid #f57c00; padding: .6rem .8rem; font-size: .85rem; border-radius: 4px; margin-top: .5rem; }
  .tension::before { content: "⚡ "; }
  .footer { text-align: center; font-size: .8rem; color: #999; padding: 1rem; }
</style>
<div class="header">
  <h1>量潮科技 · 战略管理</h1>
  <p>从项目制服务转型产品制服务（PaaS 云厂商）</p>
</div>
<div class="container">

<div class="card">
  <h2>公司战略</h2>
  <p style="margin:.5rem 0"><strong>方向：</strong>从项目制服务转型产品制服务（PaaS 云厂商）</p>
  <div class="tension">一方面必须做项目养活自己、积累客户和案例；另一方面必须自研平台封装日益复杂的业务流程。</div>
</div>

<h2 style="margin:0 0 .5rem;font-size:1.1rem">业务战略</h2>
<div class="grid" id="business"></div>

<h2 style="margin:.5rem 0;font-size:1.1rem">职能战略</h2>
<div id="functional"></div>

<div class="footer">量潮科技 · 战略管理看板 · 数据更新于 2026-07-08</div>
</div>

<script>
const data = {
  "corporate_strategy": {
    "direction": "从项目制服务转型产品制服务（PaaS 云厂商）",
    "tension": "一方面必须做项目养活自己、积累客户和案例；另一方面必须自研平台封装日益复杂的业务流程。"
  },
  "business_strategy": [
    {"name":"量潮数据","challenge":"增长瓶颈在于讲清楚我们能做什么。规范程度和交付能力已获客户认可，难点在于增加获客能力和技术供给，让技术管理能力形成规模效应，突破规模化临界点。","signal":"公开案例库已纳入排期；全周同时推进客户边界建立、交付流程透明化和数据安全方案"},
    {"name":"量潮课堂","challenge":"需确立围绕企业培训的模式。已有浙理定制微专业经验可迁移，但新商业模式尚未跑通。","signal":"方向已收敛到团体/企业培训（高校半价、企业全价），但未排入执行"},
    {"name":"量潮咨询","challenge":"客户谈判周期长，需求五花八门，决策压力大。","signal":"策略转型中：放弃合作方/盟友依赖，转向自建获客和积累项目方案"},
    {"name":"量潮云","challenge":"研发投入巨大，当前以降级为内源项目为目标——统一各业务标准，让数据案例进课程、课程成果支持数据。","signal":"DevOps CLI v0.10.0 已发布，10+ 文档仓库已完善。已超越内源阶段，正探索外部贡献者模式和开源共建"}
  ],
  "functional_strategies": [
    {"name":"新媒体运营","goal":"在自媒体和各方博弈。用内容换数据，以起号为主要目的。","tactics":["厦大经济黑粉主题贴：和平台算法博弈，测试学生是否会支持我们。","企业服务商：借助甲方身份，强化互动，把账号做起来。","公开招标设计需求：把甲方诉求变成内容，同时起号"],"signal":"多条业务线同时在用内容换数据的思路推进新媒体，机构号和个人号并行"}
  ]
};

const colors = ["#1565c0","#2e7d32","#e65100","#6a1b9a"];
data.business_strategy.forEach((b, i) => {
  const div = document.createElement('div');
  div.className = 'bu';
  div.style.borderTopColor = colors[i % colors.length];
  div.innerHTML = `
    <h3>${b.name}</h3>
    <div class="tag">挑战</div>
    <div class="challenge">${b.challenge}</div>
    <div class="signal">${b.signal}</div>`;
  document.getElementById('business').appendChild(div);
});

data.functional_strategies.forEach(f => {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <h2>${f.name}</h2>
    <p style="margin:.3rem 0"><strong>目标：</strong>${f.goal}</p>
    <ul class="tactics">${f.tactics.map(t => `<li>${t}</li>`).join('')}</ul>
    <div class="signal" style="margin-top:.5rem">${f.signal}</div>`;
  document.getElementById('functional').appendChild(div);
});
</script>
</html>
